<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heute wird ein guter Tag 🌳</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 36px;
      transition: background 1.5s ease;
    }

    body.weather-summer  { background: linear-gradient(160deg, #3d8ec8 0%, #87ceeb 50%, #6ab848 100%); }
    body.weather-rain    { background: linear-gradient(160deg, #3a4e60 0%, #607a8e 50%, #4a7040 100%); }
    body.weather-winter  { background: linear-gradient(160deg, #9eb4c8 0%, #c8dcea 50%, #b8ccd4 100%); }
    body.weather-evening { background: linear-gradient(160deg, #1a2a4a 0%, #2d4a6e 50%, #3a5a30 100%); }
    body.weather-night   { background: linear-gradient(160deg, #0a0f1e 0%, #141c30 50%, #1a2810 100%); }

    .page-title {
      font-size: clamp(1.3rem, 4vw, 2rem);
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.28);
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .weather-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 10px 28px 14px;
      margin-bottom: 18px;
      text-align: center;
      box-shadow: 0 4px 22px rgba(0,0,0,0.14);
      min-width: 190px;
    }
    .wc-icon { font-size: 2.6rem; line-height: 1.1; }
    .wc-temp { font-size: 1.65rem; font-weight: 700; color: #2a2a2a; }
    .wc-desc { font-size: 0.9rem; color: #555; margin-top: 2px; }

    .scene-wrap { width: 100%; max-width: 780px; filter: drop-shadow(0 8px 22px rgba(0,0,0,0.2)); }
    .scene-wrap svg { width: 100%; height: auto; display: block; }

    .greetings {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center; margin-top: 18px;
      max-width: 720px; width: 100%;
    }
    .bubble {
      background: rgba(255,255,255,0.93);
      border-radius: 22px; padding: 13px 20px; max-width: 315px;
      font-size: 1rem; line-height: 1.55; text-align: center;
      box-shadow: 0 3px 16px rgba(0,0,0,0.13); color: #333;
      opacity: 0; animation: pop-in 0.55s ease-out forwards;
    }
    .bubble.mouse-says  { animation-delay: 0.7s; }
    .bubble.rabbit-says { animation-delay: 1.8s; }

    @keyframes pop-in {
      0%   { opacity:0; transform:scale(0.82) translateY(14px); }
      65%  { opacity:1; transform:scale(1.05) translateY(-3px); }
      100% { opacity:1; transform:scale(1) translateY(0); }
    }

    /* Weather SVG visibility */
    .sky-el { display: none; }
    body.weather-summer  .sky-el.summer  { display: block; }
    body.weather-rain    .sky-el.rain    { display: block; }
    body.weather-winter  .sky-el.winter  { display: block; }
    body.weather-evening .sky-el.evening { display: block; }
    body.weather-night   .sky-el.night   { display: block; }
    /* Evening also shows the night sky base */
    body.weather-evening .sky-el.night-base { display: block; }
    body.weather-night   .sky-el.night-base { display: block; }

    /* Nacht + Abend: Sonne, Regen- und Winterelemente ausblenden */
    body.weather-night   .sky-el.summer,
    body.weather-night   .sky-el.rain,
    body.weather-night   .sky-el.winter { display: none !important; }
    body.weather-evening .sky-el.summer,
    body.weather-evening .sky-el.rain,
    body.weather-evening .sky-el.winter { display: none !important; }

    /* Outfit visibility */
    .fit-summer, .fit-rain, .fit-winter { display: none; }
    body.weather-summer  .fit-summer { display: block; }
    body.weather-rain    .fit-rain   { display: block; }
    body.weather-winter  .fit-winter { display: block; }
    /* Evening/night → use summer outfits as base */
    body.weather-evening .fit-summer { display: block; }
    body.weather-night   .fit-summer { display: block; }

    /* Rain animation */
    @keyframes rain-fall {
      from { transform:translateY(-60px); opacity:0.85; }
      to   { transform:translateY(260px); opacity:0.2; }
    }
    .rain-a { animation: rain-fall 1.35s linear infinite; }
    .rain-b { animation: rain-fall 1.35s linear infinite -0.67s; }
    .rain-c { animation: rain-fall 1.35s linear infinite -1.05s; }

    /* Snow animation */
    @keyframes snow-fall {
      from { transform:translate(0,-80px) rotate(0deg); opacity:0.9; }
      to   { transform:translate(20px,270px) rotate(540deg); opacity:0.15; }
    }
    .snow-a { animation: snow-fall 3.4s ease-in infinite; }
    .snow-b { animation: snow-fall 3.4s ease-in infinite -1.7s; }

    /* Star twinkle */
    @keyframes twinkle {
      0%,100% { opacity: 0.9; r: 2; }
      50%      { opacity: 0.3; r: 1; }
    }
    @keyframes twinkle-slow {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 0.15; }
    }

    /* Moon glow pulse */
    @keyframes moon-glow {
      0%,100% { opacity: 0.18; }
      50%      { opacity: 0.32; }
    }

    /* Firefly float for evening */
    @keyframes firefly {
      0%   { transform: translate(0,0);    opacity:0; }
      20%  { opacity: 0.9; }
      80%  { opacity: 0.6; }
      100% { transform: translate(24px,-18px); opacity:0; }
    }
  </style>
</head>

<body class="weather-summer">

  <h1 class="page-title" id="page-title">🌳 Heute wird ein guter Tag</h1>

  <div class="weather-card">

        <linearGradient id="sky-s" x1="0%" y1="0%" x2="0%" y2="100%">

          <stop offset="0%"   stop-color="#9db6ca"/>

        </linearGradient>
        <linearGradient id="sky-eve" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#0d1b38"/>
          <stop offset="60%"  stop-color="#1a3a6a"/>
          <stop offset="100%" stop-color="#2a5a28"/>
        </linearGradient>
        <linearGradient id="sky-night" x1="0%" y1="0%" x2="0%" y2="100%">

          <stop offset="100%" stop-color="#0d1520"/>
        </linearGradient>

          <stop offset="100%" stop-color="#3d7a28"/>

      <!-- ══ TREE – Rain ══ -->

  <div class="greetings">
    <div class="bubble mouse-says"  id="mouse-bubble"></div>
    <div class="bubble rabbit-says" id="rabbit-bubble"></div>
  </div>

  <script>
    const WMO = {
       0:{e:'☀️',d:'Strahlend sonnig'},1:{e:'🌤️',d:'Überwiegend klar'},
       2:{e:'⛅',d:'Teilweise bewölkt'},3:{e:'☁️',d:'Bedeckt'},
      45:{e:'🌫️',d:'Nebelig'},48:{e:'🌫️',d:'Reifnebel'},
      51:{e:'🌦️',d:'Leichter Nieselregen'},53:{e:'🌦️',d:'Nieselregen'},
      55:{e:'🌧️',d:'Starker Nieselregen'},61:{e:'🌧️',d:'Leichter Regen'},
      63:{e:'🌧️',d:'Regen'},65:{e:'🌧️',d:'Starker Regen'},
      71:{e:'❄️',d:'Leichter Schneefall'},73:{e:'❄️',d:'Schneefall'},
      75:{e:'❄️',d:'Starker Schneefall'},77:{e:'🌨️',d:'Schneekörner'},
      80:{e:'🌦️',d:'Leichte Regenschauer'},81:{e:'🌧️',d:'Regenschauer'},
      82:{e:'⛈️',d:'Starke Regenschauer'},85:{e:'🌨️',d:'Leichte Schneeschauer'},
      86:{e:'🌨️',d:'Starke Schneeschauer'},95:{e:'⛈️',d:'Gewitter'},
      96:{e:'⛈️',d:'Gewitter mit Hagel'},99:{e:'⛈️',d:'Schweres Gewitter'}
    };

    function wmoInfo(code) {
      if (WMO[code]) return WMO[code];
      const keys = Object.keys(WMO).map(Number).sort((a,b)=>a-b);
      for (let i = keys.length-1; i >= 0; i--) {
        if (keys[i] <= code) return WMO[keys[i]];
      }
      return {e:'🌤️', d:'Wetter unbekannt'};
    }

    function weatherType(code, temp) {
      if ((code >= 71 && code <= 77) || code === 85 || code === 86) return 'winter';
      if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95) return 'rain';
      if (temp < 8) return 'winter';
      return 'summer';
    }

    /* ── Tageszeit erkennen ── */
    function getTimeOfDay() {
      const h = parseInt(new Date().toLocaleString('de-DE', {
        timeZone: 'Europe/Berlin', hour: 'numeric', hour12: false
      }));
      if (h >= 22 || h < 6) return 'night';
      if (h >= 18)           return 'evening';
      return 'day';
    }

    /* ── Sprechblasen: täglich wechselnd ── */
  const mausSpruche = {
  day: [
    '🐭 „Ich wünsche dir einen schönen Tag, lieber Hase!"',
    '🐭 „Ich habe extra Erdbeertorte mitgebracht!"',
    '🐭 „Magst du noch ein Sandwich?"',
    '🐭 „Schön, dass wir uns treffen!"',
    '🐭 „Die Sonne scheint so schön heute!"',
    '🐭 „Ich hab Himbeerlimonade dabei – magst du?"',
    '🐭 „Heute ist wirklich ein besonderer Tag!"',
  ],
  evening: [
    '🐭 „Schau mal, wie schön der Sonnenuntergang ist!"',
    '🐭 „Abends schmeckt das Picknick gleich doppelt gut!"',
    '🐭 „Sieh mal, die ersten Sterne erscheinen!"',
    '🐭 „Was für ein friedlicher Abend!"',
    '🐭 „Ich könnte ewig hier sitzen bleiben!"',
  ],
  night: [
    '🐭 „Die Sterne sind heute wunderschön!"',
    '🐭 „So eine ruhige Nacht… einfach zauberhaft!"',
    '🐭 „Sieh mal, eine Sternschnuppe! Wünsch dir was!"',
    '🐭 „Nachts ist es hier so friedlich!"',
    '🐭 „Noch ein Stück Kuchen bei Mondschein?"',
  ]
};

const haseSpruche = {
  day: [
    '🐰 „Danke. Ich dir auch, liebe Maus!"',
    '🐰 „Mmh, das schmeckt köstlich!"',
    '🐰 „Danke, du bist die beste Freundin!"',
    '🐰 „Ja, das finde ich auch!"'
    '🐰 „Auf unsere Freundschaft! 🥂"',
    '🐰 „Ich hab Möhrenkuchen mitgebracht!"',
    '🐰 „So ein wunderschöner Tag!"',
  ],
  evening: [
    '🐰 „Wunderschön – der Himmel leuchtet orange!"',
    '🐰 „Abendpicknick ist das Beste!"',
    '🐰 „Gleich kommen die Glühwürmchen!"',
    '🐰 „Dieser Abend ist wie aus einem Märchen!"',
    '🐰 „Ich auch – lass uns noch bleiben!"',
  ],
  night: [
    '🐰 „Ich glaube, das ist der Große Wagen dort!"',
    '🐰 „Gefällt mir auch – einfach wunderschön!"',
    '🐰 „Ich wünsch mir… noch mehr Picknicks mit dir!"',
    '🐰 „Ja, bei Mondschein schmeckt alles besser!"',
    '🐰 „Psst… hörst du die Grillen?"',
  ]
};
    const tag = new Date().getDate();
    const i = tag % mausSpruche.length;
    document.getElementById('mouse-bubble').textContent  = mausSpruche[i];
    document.getElementById('rabbit-bubble').textContent = haseSpruche[i];

    /* ── Wetter + Tageszeit anwenden ── */
    function applyWeather(temp, code) {
      const wType   = weatherType(code, temp);
      const timeMode = getTimeOfDay();
      const info    = wmoInfo(code);

      // Tageszeit hat Vorrang beim Hintergrund, Wetter beim Outfit
      if (timeMode === 'night') {
        document.body.className = 'weather-night weather-' + wType;
      } else if (timeMode === 'evening') {
        document.body.className = 'weather-evening weather-' + wType;
      } else {
        document.body.className = 'weather-' + wType;
      }

      document.getElementById('wc-icon').textContent = info.e;
      document.getElementById('wc-temp').textContent = temp + ' °C';
      document.getElementById('wc-desc').textContent = 'Berlin · ' + info.d;

      // Titel je nach Tageszeit
      const titles = {
        day:     '🌳 Heute wird ein guter Tag',
        evening: '🌙 Einen schönen Abend!',
        night:   '⭐ Eine gute Nacht!'
      };
      document.getElementById('page-title').textContent = titles[timeMode];
    }

    async function loadWeather() {
      try {
        const res  = await fetch(
          'https://api.open-meteo.com/v1/forecast?latitude=52.52&longitude=13.41' +
          '&current=temperature_2m,weathercode&timezone=Europe%2FBerlin'
        );
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        applyWeather(Math.round(data.current.temperature_2m), data.current.weathercode);
      } catch (err) {
        const m = new Date().getMonth();
        let fbCode = 1, fbTemp = 18;
        if (m === 11 || m <= 1)    { fbCode = 73; fbTemp = -2; }
        else if (m >= 3 && m <= 9) { fbCode = 1;  fbTemp = 22; }
        else                        { fbCode = 61; fbTemp = 10; }
        applyWeather(fbTemp, fbCode);
      }
    }

    loadWeather();
  </script>
